<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e0415"/><stop offset="100%" stop-color="#380825"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff4080"/><stop offset="100%" stop-color="#ff80aa"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <circle cx="660" cy="80" r="180" fill="#ff4080" opacity="0.08"/>
  <circle cx="600" cy="380" r="100" fill="#ff2060" opacity="0.05"/>
  <!-- VIP diamond/gem -->
  <polygon points="640,130 710,200 640,310 570,200" fill="#380820" stroke="#ff4080" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="640,155 695,200 640,275 585,200" fill="none" stroke="#ff80aa" stroke-width="1.5" opacity="0.4"/>
  <polygon points="570,200 610,168 640,155" fill="#ff4080" opacity="0.3"/>
  <polygon points="710,200 670,168 640,155" fill="#ff80aa" opacity="0.2"/>
  <text x="70" y="200" fill="#ffc0d8" font-family="Space Grotesk, Arial" font-size="46" font-weight="800">SUBSCRIPTION</text>
  <text x="70" y="272" fill="url(#acc)" font-family="Space Grotesk, Arial" font-size="72" font-weight="800">VIP</text>
  <rect x="70" y="294" width="110" height="4" rx="2" fill="url(#acc)" opacity="0.7"/>
  <text x="70" y="336" fill="#e06088" font-family="IBM Plex Mono, monospace" font-size="19" letter-spacing="3">ELITE ACCESS</text>
  <text x="70" y="371" fill="#902050" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2">VIP MEMBER PLAN</text>
