    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00cc88"/><stop offset="100%" stop-color="#66ffcc"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <circle cx="660" cy="80" r="155" fill="#00cc88" opacity="0.07"/>
  <!-- Robot head -->
  <rect x="600" y="155" width="120" height="100" rx="14" fill="#082818" stroke="#00cc88" stroke-width="2" filter="url(#glow)"/>
  <rect x="615" y="140" width="90" height="20" rx="8" fill="#082818" stroke="#00cc88" stroke-width="1.5"/>
  <circle cx="640" cy="198" r="14" fill="#00cc88" opacity="0.2" stroke="#00cc88" stroke-width="1.5"/>
  <circle cx="680" cy="198" r="14" fill="#00cc88" opacity="0.2" stroke="#00cc88" stroke-width="1.5"/>
  <circle cx="640" cy="198" r="7" fill="url(#acc)" opacity="0.9"/>
  <circle cx="680" cy="198" r="7" fill="url(#acc)" opacity="0.9"/>
  <rect x="625" y="222" width="70" height="10" rx="5" fill="#00cc88" opacity="0.5"/>
