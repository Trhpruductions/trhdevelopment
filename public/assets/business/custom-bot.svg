  <text x="70" y="265" fill="url(#acc)" font-family="Space Grotesk, Arial" font-size="64" font-weight="800">BOT</text>
  <rect x="70" y="286" width="120" height="4" rx="2" fill="url(#acc)" opacity="0.6"/>
  <text x="70" y="328" fill="#30b878" font-family="IBM Plex Mono, monospace" font-size="19" letter-spacing="3">BUILT TO ORDER</text>
  <text x="70" y="363" fill="#156840" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2">TRH DEVELOPMENT</text>
