  <rect x="580" y="185" width="120" height="20" rx="4" fill="#3aff80" opacity="0.1"/>
  <rect x="580" y="220" width="100" height="20" rx="4" fill="#3aff80" opacity="0.1"/>
  <circle cx="595" cy="260" r="8" fill="none" stroke="#3aff80" stroke-width="2"/>
  <circle cx="595" cy="290" r="8" fill="none" stroke="#3aff80" stroke-width="2"/>
  <line x1="611" y1="260" x2="700" y2="260" stroke="#3aff80" stroke-width="1.5" opacity="0.5"/>
  <line x1="611" y1="290" x2="700" y2="290" stroke="#3aff80" stroke-width="1.5" opacity="0.5"/>
