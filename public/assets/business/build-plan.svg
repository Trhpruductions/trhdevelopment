  <text x="70" y="328" fill="#40c878" font-family="IBM Plex Mono, monospace" font-size="19" letter-spacing="3">PROJECT SCOPE</text>
  <text x="70" y="363" fill="#1a7848" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2">TRH DEVELOPMENT</text>
