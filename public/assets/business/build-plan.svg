  <line x1="640" y1="120" x2="640" y2="360" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
  <line x1="680" y1="120" x2="680" y2="360" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
  <line x1="720" y1="120" x2="720" y2="360" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
