  <line x1="560" y1="160" x2="760" y2="160" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
  <line x1="560" y1="200" x2="760" y2="200" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
  <line x1="560" y1="240" x2="760" y2="240" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
  <line x1="560" y1="280" x2="760" y2="280" stroke="#3aff80" stroke-width="0.8" opacity="0.3"/>
