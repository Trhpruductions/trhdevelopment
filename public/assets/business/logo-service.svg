  <text x="70" y="195" fill="#b0d4f8" font-family="Space Grotesk, Arial" font-size="46" font-weight="800">LOGO</text>
  <text x="70" y="265" fill="url(#acc)" font-family="Space Grotesk, Arial" font-size="64" font-weight="800">SERVICE</text>
  <rect x="70" y="286" width="190" height="4" rx="2" fill="url(#acc)" opacity="0.6"/>
  <text x="70" y="328" fill="#4888c8" font-family="IBM Plex Mono, monospace" font-size="19" letter-spacing="3">BRAND DESIGN</text>
  <text x="70" y="363" fill="#2050a0" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2">TRH DEVELOPMENT</text>
