<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#041420"/><stop offset="100%" stop-color="#082438"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00c8ff"/><stop offset="100%" stop-color="#80e4ff"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <circle cx="200" cy="165" r="110" fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.2"/>
  <!-- Robot head -->
  <rect x="130" y="100" width="140" height="110" rx="18" fill="#061e34" stroke="#00c8ff" stroke-width="2" filter="url(#glow)"/>
  <rect x="155" y="82" width="90" height="22" rx="10" fill="#061e34" stroke="#00c8ff" stroke-width="1.5"/>
  <circle cx="172" cy="148" r="18" fill="#041428" stroke="#00c8ff" stroke-width="1.5"/>
  <circle cx="228" cy="148" r="18" fill="#041428" stroke="#00c8ff" stroke-width="1.5"/>
  <circle cx="172" cy="148" r="9" fill="url(#acc)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="228" cy="148" r="9" fill="url(#acc)" opacity="0.9" filter="url(#glow)"/>
  <rect x="160" y="178" width="80" height="14" rx="7" fill="#00c8ff" opacity="0.4"/>
  <!-- arms/body -->
  <rect x="110" y="210" width="24" height="50" rx="10" fill="#061e34" stroke="#00c8ff" stroke-width="1.5"/>
  <rect x="266" y="210" width="24" height="50" rx="10" fill="#061e34" stroke="#00c8ff" stroke-width="1.5"/>
  <rect x="142" y="210" width="116" height="70" rx="14" fill="#061e34" stroke="#00c8ff" stroke-width="2" filter="url(#glow)"/>
  <rect x="160" y="228" width="34" height="20" rx="6" fill="#00c8ff" opacity="0.15" stroke="#00c8ff" stroke-width="1"/>
  <rect x="206" y="228" width="34" height="20" rx="6" fill="#00c8ff" opacity="0.15" stroke="#00c8ff" stroke-width="1"/>
  <text x="200" y="336" fill="url(#acc)" font-family="Space Grotesk, Arial" font-size="28" font-weight="800" text-anchor="middle">BOTS</text>
  <text x="200" y="364" fill="#1a6888" font-family="IBM Plex Mono, monospace" font-size="14" text-anchor="middle" letter-spacing="2">TRH</text>
</svg>
