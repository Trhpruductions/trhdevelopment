<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#1c1410"/><stop offset="100%" stop-color="#080505"/></radialGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#92400e"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>
  <!-- outer rune border ring -->
  <circle cx="60" cy="58" r="42" fill="none" stroke="#92400e" stroke-width="3"/>
  <circle cx="60" cy="58" r="38" fill="none" stroke="#d97706" stroke-width="1" opacity="0.6"/>
  <!-- 8-pointed star rays -->
  <line x1="60" y1="16" x2="60" y2="100" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="58" x2="102" y2="58" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <line x1="31" y1="27" x2="89" y2="89" stroke="#78350f" stroke-width="1" opacity="0.4"/>
  <line x1="89" y1="27" x2="31" y2="89" stroke="#78350f" stroke-width="1" opacity="0.4"/>
  <!-- rune outer ring dots -->
  <circle cx="60" cy="17" r="4" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="100" cy="58" r="4" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="60" cy="99" r="4" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="20" cy="58" r="4" fill="#fbbf24" filter="url(#glow)"/>
  <!-- Celtic knot center diamond -->
  <polygon points="60,34 76,58 60,82 44,58" fill="#92400e" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="60,40 71,58 60,76 49,58" fill="url(#center)" filter="url(#glow)"/>
  <!-- inner rune mark -->
  <text x="60" y="63" font-family="serif" font-size="18" font-weight="bold" fill="#1c1410" text-anchor="middle" opacity="0.9">✦</text>
  <!-- label -->
  <rect x="8" y="104" width="104" height="14" rx="7" fill="#080505" stroke="#d97706" stroke-width="1"/>
  <text x="60" y="115" font-family="monospace" font-size="7" font-weight="bold" fill="#fbbf24" text-anchor="middle" letter-spacing="1.5">SHADOWS OF RUIN</text>
</svg>
