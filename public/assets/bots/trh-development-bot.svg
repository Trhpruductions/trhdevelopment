<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#0c4a6e"/><stop offset="100%" stop-color="#020d1a"/></radialGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#164e63"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>
  <!-- outer hex ring glow -->
  <polygon points="60,14 88,30 88,66 60,82 32,66 32,30" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- hex body -->
  <polygon points="60,18 86,33 86,63 60,78 34,63 34,33" fill="url(#hex)"/>
  <!-- inner hex -->
  <polygon points="60,24 81,36 81,60 60,72 39,60 39,36" fill="#0a2a3d"/>
  <!-- TRH bold text -->
  <text x="60" y="58" font-family="'Space Grotesk',sans-serif" font-size="22" font-weight="700" fill="#67e8f9" text-anchor="middle" filter="url(#glow)">TRH</text>
  <!-- subtitle -->
  <text x="60" y="67" font-family="monospace" font-size="6.5" fill="#a5f3fc" text-anchor="middle" letter-spacing="2">DEVELOPMENT</text>
  <!-- corner dots on hex points -->
  <circle cx="60" cy="18" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="86" cy="33" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="86" cy="63" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="60" cy="78" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="34" cy="63" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="34" cy="33" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <!-- label -->
  <rect x="26" y="87" width="68" height="16" rx="8" fill="#020d1a" stroke="#22d3ee" stroke-width="1"/>
  <text x="60" y="99" font-family="monospace" font-size="7.5" font-weight="bold" fill="#67e8f9" text-anchor="middle" letter-spacing="1">TRH DEV BOT</text>
</svg>
