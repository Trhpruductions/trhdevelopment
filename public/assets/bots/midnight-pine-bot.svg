<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#064e3b"/><stop offset="100%" stop-color="#01120a"/></radialGradient>
    <linearGradient id="pine" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>
  <!-- race track oval -->
  <ellipse cx="60" cy="72" rx="44" ry="16" fill="none" stroke="#065f46" stroke-width="6"/>
  <ellipse cx="60" cy="72" rx="44" ry="16" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- pine tree large -->
  <polygon points="60,12 73,34 67,34 78,54 60,54 42,54 53,34 47,34" fill="url(#pine)" filter="url(#glow)"/>
  <!-- second smaller pine layer -->
  <polygon points="60,30 70,46 50,46" fill="#6ee7b7" opacity="0.5"/>
  <!-- trunk -->
  <rect x="56" y="54" width="8" height="10" rx="2" fill="#065f46"/>
  <!-- race car body on track -->
  <rect x="36" y="67" width="22" height="9" rx="4" fill="#059669"/>
  <rect x="38" y="65" width="18" height="6" rx="3" fill="#34d399"/>
  <circle cx="39" cy="76" r="3.5" fill="#01120a" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="55" cy="76" r="3.5" fill="#01120a" stroke="#34d399" stroke-width="1.5"/>
  <!-- speed lines -->
  <line x1="62" y1="70" x2="78" y2="70" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="73" x2="80" y2="73" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <!-- badge -->
  <rect x="16" y="90" width="88" height="16" rx="8" fill="#01120a" stroke="#34d399" stroke-width="1"/>
  <text x="60" y="102" font-family="monospace" font-size="7.5" font-weight="bold" fill="#6ee7b7" text-anchor="middle" letter-spacing="1">MIDNIGHT PINE</text>
</svg>
